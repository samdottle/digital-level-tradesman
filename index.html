<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#f1f5f9}
@keyframes bounceUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spinAnim{to{transform:rotate(360deg)}}
@keyframes pulseAnim{0%,100%{opacity:1}50%{opacity:0.4}}
.bounce{animation:bounceUp 0.9s ease-in-out infinite}
.spin{animation:spinAnim 1s linear infinite}
.toast-in{animation:toastIn 0.3s ease-out forwards}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:24px;background:transparent;cursor:pointer;margin:0}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:#1e293b}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fbbf24;margin-top:-8px;border:2px solid #0d1117}
</style>

<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const h=React.createElement;

// ── Constants — EXACTLY from Base44 ─────────────────────────────────────────
const SERVICE_UUID='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID='6e400003-b5a3-f393-e0a9-e50e24dcca9e';
const EMA_ALPHA=0.05;   // EXACTLY from Base44
const THRESHOLD=0.5;    // EXACTLY from Base44
const MAX_DEG=3;        // EXACTLY from Base44
const WHEELBASE_IN=120; // EXACTLY from Base44
const TRACK_IN=96;      // EXACTLY from Base44
const DEFAULT_JACKS={LF:0,RF:0,LR:0,RR:0}; // EXACTLY from Base44

// ── jacksToPitchRoll — EXACTLY from Base44 JackDemoControls.jsx ─────────────
function jacksToPitchRoll(jacks){
  const{LF,RF,LR,RR}=jacks;
  const frontAvg=(LF+RF)/2;
  const rearAvg=(LR+RR)/2;
  const leftAvg=(LF+LR)/2;
  const rightAvg=(RF+RR)/2;
  const pitchRad=Math.atan((frontAvg-rearAvg)/WHEELBASE_IN);
  const rollRad=Math.atan((rightAvg-leftAvg)/TRACK_IN);
  return{
    pitch:pitchRad*(180/Math.PI),
    roll:rollRad*(180/Math.PI),
  };
}

function randomJacks(){
  return{
    LF:parseFloat((Math.random()*4).toFixed(1)),
    RF:parseFloat((Math.random()*4).toFixed(1)),
    LR:parseFloat((Math.random()*4).toFixed(1)),
    RR:parseFloat((Math.random()*4).toFixed(1)),
  };
}

// ── cornerHeight — EXACTLY from Base44 JackAdvisory.jsx ─────────────────────
function cornerHeight(id,pitch,roll){
  switch(id){
    case 'FL': return  pitch-roll;
    case 'FR': return  pitch+roll;
    case 'RL': return -pitch-roll;
    case 'RR': return -pitch+roll;
    default:   return 0;
  }
}

// ── CORNERS — EXACTLY from Base44 JackAdvisory.jsx ──────────────────────────
const CORNERS=[
  {id:'FL',label:'LF',x:'18%',y:'14%'},
  {id:'FR',label:'RF',x:'74%',y:'14%'},
  {id:'RL',label:'LR',x:'18%',y:'76%'},
  {id:'RR',label:'RR',x:'74%',y:'76%'},
];

// ── Helpers ──────────────────────────────────────────────────────────────────
function clamp(v,mn,mx){return Math.min(Math.max(v,mn),mx)}
function sign(v){return v>0?'+':''}

// ── Toast ────────────────────────────────────────────────────────────────────
function useToast(){
  const[ts,setTs]=useState([]);
  const show=useCallback((msg,type='info')=>{
    const id=Date.now();
    setTs(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setTs(t=>t.filter(x=>x.id!==id)),3000);
  },[]);
  return{ts,show};
}

// ── Plain dark background — no SVG image that can introduce orientation confusion
function RVBackground(){
  return h('div',{style:{position:'absolute',inset:0,
    background:'radial-gradient(ellipse at center, #0e1929 0%, #050810 100%)'}});
}

// ── JackPin — EXACTLY from Base44 JackAdvisory.jsx ──────────────────────────
function JackPin({corner,height,maxHeight,minHeight,threshold}){
  const deficit=maxHeight-height;
  const isRef=deficit<0.05;
  const range=maxHeight-minHeight;
  const arrowScale=range>0.05?Math.min(deficit/range,1):0;
  let bg,border,col;
  if(isRef){
    bg='rgba(100,116,139,0.7)';border='rgba(148,163,184,0.5)';col='#94a3b8';
  }else if(deficit<=threshold){
    bg='rgba(52,211,153,0.25)';border='rgba(52,211,153,0.8)';col='#34d399';
  }else if(deficit<=threshold*2){
    bg='rgba(250,204,21,0.25)';border='rgba(250,204,21,0.8)';col='#facc15';
  }else{
    bg='rgba(248,113,113,0.25)';border='rgba(248,113,113,0.8)';col='#f87171';
  }
  return h('div',{style:{position:'absolute',left:corner.x,top:corner.y,
    transform:'translate(-50%,-50%)',zIndex:20,
    display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}},
    !isRef&&deficit>0.05&&h('div',{className:'bounce',
      style:{color:col,fontSize:`${14+arrowScale*8}px`,lineHeight:1}},'\u25B2'),
    h('div',{style:{background:bg,border:`1.5px solid ${border}`,
      backdropFilter:'blur(4px)',borderRadius:'8px',padding:'4px 6px',
      display:'flex',flexDirection:'column',alignItems:'center',minWidth:'42px'}},
      h('svg',{width:20,height:14,viewBox:'0 0 20 14',fill:'none'},
        h('rect',{x:0,y:11,width:20,height:3,rx:1,fill:col,opacity:0.8}),
        h('rect',{x:0,y:0,width:20,height:3,rx:1,fill:col,opacity:0.8}),
        h('line',{x1:4,y1:11,x2:10,y2:3,stroke:col,strokeWidth:1.5,opacity:0.9}),
        h('line',{x1:16,y1:11,x2:10,y2:3,stroke:col,strokeWidth:1.5,opacity:0.9}),
        h('line',{x1:4,y1:3,x2:10,y2:11,stroke:col,strokeWidth:1.5,opacity:0.6}),
        h('line',{x1:16,y1:3,x2:10,y2:11,stroke:col,strokeWidth:1.5,opacity:0.6})
      ),
      h('span',{style:{fontSize:'11px',fontWeight:700,color:col,lineHeight:1,marginTop:'2px'}},corner.label)
    ),
    !isRef&&deficit>0.05&&h('div',{style:{fontSize:'12px',fontFamily:'monospace',
      fontWeight:700,color:col,textShadow:'0 1px 4px rgba(0,0,0,0.8)',lineHeight:1}},
      `+${deficit.toFixed(2)}\u00B0`)
  );
}

// ── RVBullsEye — Base44 RVBullsEye.jsx logic, SVG background replaced ───────
// bubbleX/Y formula EXACTLY from Base44
function RVBullsEye({pitch,roll,threshold,isLevel}){
  const SIZE=310;
  const RADIUS=SIZE/2;
  // EXACTLY from Base44:
  const bubbleX=clamp(-roll/MAX_DEG,-1,1)*(RADIUS*0.72);
  const bubbleY=clamp(pitch/MAX_DEG,-1,1)*(RADIUS*0.72);
  const levelZoneR=(threshold/MAX_DEG)*(RADIUS*0.72);
  const bubbleColor=isLevel?'#34d399':
    Math.abs(pitch)<=threshold*2&&Math.abs(roll)<=threshold*2?'#facc15':'#f87171';

  const heights=CORNERS.map(c=>({...c,h:cornerHeight(c.id,pitch,roll)}));
  const maxH=Math.max(...heights.map(c=>c.h));
  const minH=Math.min(...heights.map(c=>c.h));

  return h('div',{style:{position:'relative',width:SIZE,height:SIZE,
    borderRadius:'16px',overflow:'hidden',
    boxShadow:'0 0 0 1px rgba(30,58,95,0.6),0 8px 40px rgba(0,0,0,0.7)'}},
    h(RVBackground),
    h('div',{style:{position:'absolute',inset:0,background:'rgba(5,8,16,0.15)'}}),
    // Jack pins — EXACTLY Base44
    ...heights.map(c=>h(JackPin,{key:c.id,corner:c,height:c.h,
      maxHeight:maxH,minHeight:minH,threshold})),
    // FRONT label — EXACTLY Base44
    h('div',{style:{position:'absolute',top:'8px',left:'50%',
      transform:'translateX(-50%)',zIndex:30}},
      h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'4px',
          background:'rgba(251,191,36,0.85)',backdropFilter:'blur(4px)',
          borderRadius:'6px',padding:'3px 10px',
          border:'1px solid rgba(251,191,36,0.6)',
          boxShadow:'0 2px 8px rgba(0,0,0,0.5)'}},
          h('span',{style:{fontSize:'10px',fontWeight:900,color:'white',
            letterSpacing:'0.12em'}},'\u25B2 FRONT')
        ),
        h('div',{style:{fontSize:'9px',color:'rgba(251,195,36,0.8)',
          fontWeight:500,letterSpacing:'0.05em',marginTop:'2px'}},'align device marker \u2192')
      )
    ),
    // REAR label — EXACTLY Base44
    h('div',{style:{position:'absolute',bottom:'8px',left:'50%',
      transform:'translateX(-50%)',zIndex:30}},
      h('div',{style:{fontSize:'10px',fontWeight:700,
        color:'rgba(255,255,255,0.3)',letterSpacing:'0.1em'}},
        'REAR \u25BC')
    ),
    // L/R labels — EXACTLY Base44
    h('div',{style:{position:'absolute',left:'8px',top:'50%',
      transform:'translateY(-50%)',zIndex:30}},
      h('div',{style:{fontSize:'10px',fontWeight:700,
        color:'rgba(255,255,255,0.3)',writingMode:'vertical-rl',
        transform:'rotate(180deg)'}},'\u25C4 L')
    ),
    h('div',{style:{position:'absolute',right:'8px',top:'50%',
      transform:'translateY(-50%)',zIndex:30}},
      h('div',{style:{fontSize:'10px',fontWeight:700,
        color:'rgba(255,255,255,0.3)',writingMode:'vertical-rl'}},
        'R \u25BA')
    ),
    // SVG bull's-eye — EXACTLY Base44
    h('svg',{style:{position:'absolute',inset:0,width:'100%',height:'100%'},
      viewBox:`${-RADIUS} ${-RADIUS} ${RADIUS*2} ${RADIUS*2}`,
      preserveAspectRatio:'xMidYMid meet'},
      h('circle',{cx:0,cy:0,r:RADIUS*0.85,fill:'none',
        stroke:'rgba(255,255,255,0.15)',strokeWidth:1.5}),
      h('circle',{cx:0,cy:0,r:RADIUS*0.55,fill:'none',
        stroke:'rgba(255,255,255,0.12)',strokeWidth:1}),
      h('circle',{cx:0,cy:0,r:levelZoneR,
        fill:isLevel?'rgba(52,211,153,0.18)':'rgba(52,211,153,0.08)',
        stroke:isLevel?'rgba(52,211,153,0.7)':'rgba(52,211,153,0.35)',
        strokeWidth:1.5}),
      h('line',{x1:-RADIUS*0.85,y1:0,x2:RADIUS*0.85,y2:0,
        stroke:'rgba(255,255,255,0.15)',strokeWidth:1}),
      h('line',{x1:0,y1:-RADIUS*0.85,x2:0,y2:RADIUS*0.85,
        stroke:'rgba(255,255,255,0.15)',strokeWidth:1}),
      // Bubble — EXACTLY Base44
      h('g',{style:{transition:'transform 0.12s ease-out'},
        transform:`translate(${bubbleX},${bubbleY})`},
        h('circle',{cx:0,cy:0,r:20,fill:'rgba(0,0,0,0.35)'}),
        h('circle',{cx:0,cy:0,r:18,fill:bubbleColor,fillOpacity:0.55,
          stroke:bubbleColor,strokeWidth:2}),
        h('circle',{cx:-5,cy:-5,r:5,fill:'rgba(255,255,255,0.35)'})
      )
    )
  );
}

// ── RVSilhouette tilt bars — EXACTLY Base44 RVSilhouette.jsx ────────────────
function TiltBar({label,value,threshold}){
  const pct=clamp(value/MAX_DEG,-1,1);
  const barColor=Math.abs(value)<=threshold?'#34d399':
    Math.abs(value)<=threshold*2?'#facc15':'#f87171';
  const leftLabel=label==='Front / Back'?'Nose Low':'Lean Left';
  const rightLabel=label==='Front / Back'?'Nose High':'Lean Right';
  return h('div',{style:{flex:1}},
    h('p',{style:{fontSize:'12px',color:'#64748b',textAlign:'center',
      marginBottom:'6px',marginTop:0}},label),
    h('div',{style:{position:'relative',height:'12px',borderRadius:'6px',
      background:'#1e293b',border:'1px solid #334155',overflow:'hidden'}},
      h('div',{style:{position:'absolute',top:0,bottom:0,
        background:'rgba(52,211,153,0.2)',
        borderLeft:'1px solid rgba(52,211,153,0.3)',
        borderRight:'1px solid rgba(52,211,153,0.3)',
        left:`${50-(threshold/MAX_DEG)*50}%`,
        width:`${(threshold/MAX_DEG)*100}%`}}),
      h('div',{style:{position:'absolute',top:0,bottom:0,left:'50%',
        width:'1px',background:'rgba(100,116,139,0.5)'}}),
      h('div',{style:{position:'absolute',top:'2px',bottom:'2px',
        width:'10px',borderRadius:'5px',background:barColor,
        left:`calc(50% + ${pct*45}% - 5px)`,
        transition:'left 0.1s ease-out'}})
    ),
    h('div',{style:{display:'flex',justifyContent:'space-between',
      fontSize:'10px',color:'#334155',marginTop:'4px'}},
      h('span',null,leftLabel),h('span',null,rightLabel))
  );
}

// ── JackDemoControls — EXACTLY Base44 JackDemoControls.jsx ──────────────────
function JackSlider({jackKey,label,value,onChange}){
  return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',
    gap:'4px',padding:'12px',borderRadius:'12px',
    background:'rgba(30,41,59,0.6)',border:'1px solid #334155'}},
    h('p',{style:{fontSize:'11px',fontWeight:700,color:'#64748b',
      textTransform:'uppercase',letterSpacing:'0.08em',margin:0}},label),
    h('p',{style:{fontSize:'18px',fontFamily:'monospace',fontWeight:700,
      color:'#fbbf24',margin:0}},`${value.toFixed(1)}"`),
    h('input',{type:'range',min:0,max:6,step:0.1,value,
      onChange:e=>onChange(jackKey,parseFloat(e.target.value))}),
    h('div',{style:{display:'flex',justifyContent:'space-between',
      width:'100%',fontSize:'11px',color:'#475569'}},
      h('span',null,'0"'),h('span',null,'6"'))
  );
}

const JACK_LAYOUT=[
  {key:'LF',label:'Left Front'},{key:'RF',label:'Right Front'},
  {key:'LR',label:'Left Rear'}, {key:'RR',label:'Right Rear'},
];

function JackDemoControls({jacks,onChange,onReset,onRandomize}){
  return h('div',{style:{width:'100%'}},
    h('div',{style:{display:'flex',alignItems:'center',
      justifyContent:'space-between',marginBottom:'12px'}},
      h('p',{style:{fontSize:'11px',fontWeight:700,color:'#fbbf24',
        textTransform:'uppercase',letterSpacing:'0.1em',margin:0}},
        'Jack Demo Controls'),
      h('div',{style:{display:'flex',gap:'6px'}},
        h('button',{onClick:onRandomize,style:{padding:'4px 10px',borderRadius:'6px',
          border:'1px solid #475569',background:'transparent',
          fontSize:'11px',color:'#94a3b8',cursor:'pointer'}},'Random'),
        h('button',{onClick:onReset,style:{padding:'4px 10px',borderRadius:'6px',
          border:'1px solid #475569',background:'transparent',
          fontSize:'11px',color:'#94a3b8',cursor:'pointer'}},'Reset')
      )
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
      JACK_LAYOUT.map(j=>h(JackSlider,{key:j.key,jackKey:j.key,label:j.label,
        value:jacks[j.key],onChange}))
    ),
    h('p',{style:{fontSize:'11px',color:'#334155',textAlign:'center',
      marginTop:'8px',marginBottom:0}},
      'Slide each jack to simulate extension height (inches)')
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const{ts,show:toast}=useToast();

  // BLE state
  const[isConnecting,setIsConnecting]=useState(false);
  const[isConnected,setIsConnected]=useState(false);
  const[deviceName,setDeviceName]=useState('');
  const txCharRef=useRef(null);
  const deviceRef=useRef(null);
  // EMA refs — EXACTLY Base44
  const emaPitchRef=useRef(null);
  const emaRollRef=useRef(null);

  // Readings
  const[pitchDeg,setPitchDeg]=useState(0);
  const[rollDeg,setRollDeg]=useState(0);

  // Local tare offsets (fix not in Base44 — needed for correct zeroing)
  const localPitchOffsetRef=useRef(0);
  const localRollOffsetRef=useRef(0);

  // Demo mode — EXACTLY Base44
  const[demoMode,setDemoMode]=useState(false);
  const[jacks,setJacks]=useState(DEFAULT_JACKS);

  // Auto-sweep sim (added feature, not in Base44)
  const[simActive,setSimActive]=useState(false);
  const[simPitch,setSimPitch]=useState(0);
  const simRef=useRef(null);

  // Display values — EXACTLY Base44 logic
  const simTilt=demoMode?jacksToPitchRoll(jacks):null;
  const displayPitch=demoMode?simTilt.pitch:simActive?simPitch:pitchDeg;
  const displayRoll=demoMode?simTilt.roll:simActive?0:rollDeg;

  // Level detection — EXACTLY Base44
  const pitchLevel=Math.abs(displayPitch)<=THRESHOLD;
  const rollLevel=Math.abs(displayRoll)<=THRESHOLD;
  const isLevel=pitchLevel&&rollLevel;

  // Auto-sweep toggle
  const toggleSim=useCallback(()=>{
    if(simActive){clearInterval(simRef.current);setSimActive(false);setSimPitch(0);}
    else{
      setDemoMode(false);
      const t0=Date.now();setSimActive(true);
      simRef.current=setInterval(()=>{
        const t=(Date.now()-t0)/1000;
        setSimPitch(parseFloat((Math.sin(t*0.6)*2.5).toFixed(2)));
      },40);
    }
  },[simActive]);
  useEffect(()=>()=>clearInterval(simRef.current),[]);

  // sendCommand
  const sendCommand=useCallback(async(command)=>{
    if(!txCharRef.current)return;
    try{
      const encoder=new TextEncoder();
      await txCharRef.current.writeValue(encoder.encode(command+'\n'));
    }catch(_){}
  },[]);

  // onData — EXACTLY Base44 EMA logic
  const onData=useCallback((e)=>{
    const val=new TextDecoder().decode(e.target.value).trim();
    const match=val.match(/P:([-\d.]+),R:([-\d.]+)/);
    if(match){
      const rawPitch=parseFloat(match[1]);
      const rawRoll=parseFloat(match[2]);
      if(emaPitchRef.current===null){
        emaPitchRef.current=rawPitch;
        emaRollRef.current=rawRoll;
      }else{
        emaPitchRef.current=EMA_ALPHA*rawPitch+(1-EMA_ALPHA)*emaPitchRef.current;
        emaRollRef.current=EMA_ALPHA*rawRoll+(1-EMA_ALPHA)*emaRollRef.current;
      }
      setPitchDeg(parseFloat((emaPitchRef.current-localPitchOffsetRef.current).toFixed(2)));
      setRollDeg(parseFloat((emaRollRef.current-localRollOffsetRef.current).toFixed(2)));
    }
  },[]);

  // onDisconnected — EXACTLY Base44
  const onDisconnected=useCallback(()=>{
    setIsConnected(false);
    txCharRef.current=null;
    emaPitchRef.current=null;
    emaRollRef.current=null;
    localPitchOffsetRef.current=0;
    localRollOffsetRef.current=0;
    toast('Disconnected from Digital Level 1 RV');
  },[toast]);

  // connectBLE — EXACTLY Base44
  const connectBLE=useCallback(async()=>{
    if(!navigator.bluetooth){
      toast('Web Bluetooth not supported. Use Chrome on Android.','error');return;
    }
    setIsConnecting(true);
    try{
      const device=await navigator.bluetooth.requestDevice({
        filters:[{services:[SERVICE_UUID]}],
        optionalServices:[SERVICE_UUID]
      });
      device.addEventListener('gattserverdisconnected',onDisconnected);
      deviceRef.current=device;
      let server;
      for(let attempt=1;attempt<=3;attempt++){
        try{server=await device.gatt.connect();break;}
        catch(e){if(attempt===3)throw e;await new Promise(r=>setTimeout(r,1000));}
      }
      const service=await server.getPrimaryService(SERVICE_UUID);
      const txChar=await service.getCharacteristic(TX_UUID);
      txCharRef.current=txChar;
      try{
        const rxChar=await service.getCharacteristic(RX_UUID);
        await rxChar.startNotifications();
        rxChar.addEventListener('characteristicvaluechanged',onData);
      }catch(_){}
      setDeviceName(device.name||'Digital Level 1 RV');
      setIsConnected(true);
      setDemoMode(false);
      setSimActive(false);
      clearInterval(simRef.current);
      toast(`Connected to ${device.name||'Digital Level 1 RV'}`,'success');
    }catch(err){
      if(err.name!=='NotFoundError')toast('Connection failed: '+err.message,'error');
    }
    setIsConnecting(false);
  },[onData,onDisconnected,toast]);

  const disconnectBLE=useCallback(()=>{
    if(deviceRef.current?.gatt?.connected)deviceRef.current.gatt.disconnect();
    setIsConnected(false);txCharRef.current=null;
  },[]);

  const handleJackChange=(key,value)=>setJacks(j=>({...j,[key]:value}));

  const statusCol=isConnected?'#34d399':(simActive||demoMode)?'#c084fc':'#475569';
  const statusLabel=isConnected?deviceName:simActive?'Auto demo':demoMode?'Jack demo':'Not connected';

  return h(React.Fragment,null,
    h('div',{style:{minHeight:'100vh',
      background:'linear-gradient(135deg,#020617,#0f172a,#020617)',
      paddingBottom:'2rem'}},

      // Header
      h('header',{style:{position:'sticky',top:0,zIndex:50,
        background:'rgba(2,6,23,0.9)',backdropFilter:'blur(12px)',
        borderBottom:'1px solid rgba(30,58,95,0.4)'}},
        h('div',{style:{maxWidth:'420px',margin:'0 auto',padding:'12px 16px',
          display:'flex',alignItems:'center',justifyContent:'space-between'}},
          h('div',{style:{display:'flex',flexDirection:'column'}},
            h('h1',{style:{fontSize:'24px',fontWeight:300,
              letterSpacing:'-0.02em',color:'white',margin:0,lineHeight:1}},
              'Digital Level ',
              h('span',{style:{fontWeight:700,color:'#fbbf24'}},'RV')
            ),
            h('p',{style:{fontSize:'11px',color:'#475569',margin:0,marginTop:'2px'}},
              'MPU-6050 \u00B7 Nano ESP32 \u00B7 BLE \u00B7 v2.1')
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:'5px',
            padding:'4px 10px',borderRadius:'20px',
            border:`1px solid ${statusCol}40`,
            background:`${statusCol}12`,
            fontSize:'11px',fontWeight:500,color:statusCol}},
            h('span',{style:{width:'6px',height:'6px',borderRadius:'50%',
              background:statusCol,display:'inline-block'}}),
            statusLabel
          )
        )
      ),

      h('div',{style:{maxWidth:'420px',margin:'0 auto',
        padding:'16px',display:'flex',flexDirection:'column',gap:'12px'}},

        // BLE Card — EXACTLY Base44 layout
        h('div',{style:{background:'rgba(15,23,42,0.5)',borderRadius:'16px',
          border:'1px solid #1e293b',padding:'14px'}},
          h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
            h('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},
              h('div',{style:{width:'40px',height:'40px',borderRadius:'50%',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',
                background:isConnected?'rgba(52,211,153,0.2)':'rgba(30,41,59,0.5)'}},
                isConnected?'\uD83D\uDCF6':'\uD83D\uDCF5'
              ),
              h('div',null,
                h('p',{style:{fontSize:'14px',fontWeight:500,color:'white',margin:0}},
                  isConnected?deviceName:'Not Connected'),
                h('p',{style:{fontSize:'12px',color:'#475569',margin:0}},
                  isConnected?'BLE connected \u00B7 streaming tilt data':'Tap Connect to pair via BLE')
              )
            ),
            h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
              // Auto-sweep button (new feature)
              h('button',{onClick:toggleSim,disabled:isConnected,
                title:simActive?'Stop simulation':'Auto-sweep demo',
                style:{width:'32px',height:'32px',borderRadius:'8px',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  border:`1px solid ${simActive?'rgba(192,132,252,0.5)':'#1e293b'}`,
                  background:simActive?'rgba(192,132,252,0.2)':'rgba(15,23,42,0.6)',
                  color:simActive?'#c084fc':'#475569',
                  cursor:isConnected?'not-allowed':'pointer',
                  opacity:isConnected?0.3:1}},
                simActive
                  ? h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',
                      stroke:'currentColor',strokeWidth:2},
                      h('rect',{x:6,y:6,width:12,height:12,rx:1}))
                  : h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',
                      stroke:'currentColor',strokeWidth:2},
                      h('polygon',{points:'5,3 19,12 5,21'}))
              ),
              // Demo toggle — EXACTLY Base44
              h('button',{
                onClick:()=>{
                  setDemoMode(d=>!d);
                  if(!demoMode){setSimActive(false);clearInterval(simRef.current);setSimPitch(0);}
                  if(!demoMode)setJacks(randomJacks());
                },
                style:{padding:'6px 12px',borderRadius:'8px',
                  border:`1px solid ${demoMode?'rgba(192,132,252,0.4)':'#1e293b'}`,
                  background:demoMode?'rgba(192,132,252,0.2)':'rgba(15,23,42,0.6)',
                  color:demoMode?'#c084fc':'#475569',
                  fontSize:'12px',cursor:'pointer'}},
                demoMode
                  ? h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',
                      stroke:'currentColor',strokeWidth:2,style:{display:'block'}},
                      h('rect',{x:6,y:6,width:12,height:12,rx:1}))
                  : h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',
                      stroke:'currentColor',strokeWidth:2,style:{display:'block'}},
                      h('polygon',{points:'5,3 19,12 5,21'}))
              ),
              // Connect button — EXACTLY Base44
              h('button',{onClick:isConnected?disconnectBLE:connectBLE,
                disabled:isConnecting||demoMode,
                style:{padding:'7px 14px',borderRadius:'8px',
                  background:isConnected?'#334155':'#059669',
                  color:'white',fontSize:'13px',fontWeight:600,
                  border:'none',cursor:(isConnecting||demoMode)?'not-allowed':'pointer',
                  opacity:(isConnecting||demoMode)?0.5:1,
                  display:'flex',alignItems:'center',gap:'6px'}},
                isConnecting
                  ? h('svg',{className:'spin',width:14,height:14,viewBox:'0 0 24 24',fill:'none'},
                      h('circle',{cx:12,cy:12,r:10,stroke:'currentColor',strokeWidth:4,opacity:0.25}),
                      h('path',{d:'M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z',fill:'currentColor',opacity:0.75}))
                  : null,
                isConnected?'Disconnect':isConnecting?'Scanning\u2026':'Connect'
              )
            )
          )
        ),

        // Level banner — EXACTLY Base44
        h('div',{style:{borderRadius:'16px',border:'1px solid',
          padding:'14px 20px',
          display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',
          transition:'all 0.2s',
          borderColor:isLevel?'rgba(52,211,153,0.5)':'rgba(51,65,85,0.6)',
          background:isLevel?'rgba(52,211,153,0.15)':'rgba(15,23,42,0.6)'}},
          isLevel
            ? h(React.Fragment,null,
                h('svg',{width:22,height:22,viewBox:'0 0 24 24',fill:'none',
                  stroke:'#34d399',strokeWidth:2.5},
                  h('path',{strokeLinecap:'round',strokeLinejoin:'round',d:'M5 13l4 4L19 7'})),
                h('p',{style:{fontSize:'17px',fontWeight:800,
                  letterSpacing:'0.15em',color:'#34d399',margin:0}},
                  '\u2713  LEVEL'))
            : h(React.Fragment,null,
                h('svg',{width:22,height:22,viewBox:'0 0 24 24',fill:'none',
                  stroke:'#fbbf24',strokeWidth:2},
                  h('path',{strokeLinecap:'round',strokeLinejoin:'round',
                    d:'M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z'})),
                h('p',{style:{fontSize:'17px',fontWeight:800,
                  letterSpacing:'0.12em',color:'#fbbf24',margin:0}},
                  'ADJUST NEEDED'))
        ),

        // Bird's-eye — EXACTLY Base44 positioning
        h('div',{style:{display:'flex',justifyContent:'center'}},
          h(RVBullsEye,{pitch:displayPitch,roll:displayRoll,
            threshold:THRESHOLD,isLevel})
        ),

        // Tilt bars — EXACTLY Base44 RVSilhouette layout
        h('div',{style:{background:'rgba(15,23,42,0.4)',borderRadius:'16px',
          border:'1px solid rgba(30,41,59,0.6)',padding:'14px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',
            gap:'8px',marginBottom:'8px'}},
            h('div',{style:{flex:1,display:'flex',justifyContent:'space-between',
              alignItems:'center'}},
              h('span',{style:{fontSize:'13px',color:'#64748b'}},'Front / Back'),
              h('span',{style:{fontSize:'15px',fontFamily:'monospace',
                fontWeight:700,color:Math.abs(displayPitch)<=THRESHOLD?'#34d399':
                  Math.abs(displayPitch)<=THRESHOLD*2?'#facc15':'#f87171'}},
                `${sign(displayPitch)}${displayPitch.toFixed(2)}\u00B0`)
            )
          ),
          h('div',{style:{display:'flex',gap:'16px'}},
            h(TiltBar,{label:'Front / Back',value:displayPitch,threshold:THRESHOLD}),
            h(TiltBar,{label:'Left / Right',value:displayRoll,threshold:THRESHOLD})
          ),
          h('div',{style:{display:'flex',justifyContent:'flex-end',marginTop:'4px'}},
            h('span',{style:{fontSize:'15px',fontFamily:'monospace',
              fontWeight:700,color:Math.abs(displayRoll)<=THRESHOLD?'#34d399':
                Math.abs(displayRoll)<=THRESHOLD*2?'#facc15':'#f87171'}},
              `${sign(displayRoll)}${displayRoll.toFixed(2)}\u00B0`)
          )
        ),

        // Jack Demo Controls — EXACTLY Base44
        demoMode&&h('div',{style:{background:'rgba(15,23,42,0.5)',
          borderRadius:'16px',border:'1px solid rgba(139,92,246,0.3)',padding:'14px'}},
          h(JackDemoControls,{jacks,
            onChange:handleJackChange,
            onReset:()=>setJacks(DEFAULT_JACKS),
            onRandomize:()=>setJacks(randomJacks())})
        ),

        // Tare — EXACTLY Base44 (with local offset fix)
        h('button',{
          onClick:()=>{
            if(isConnected){
              localPitchOffsetRef.current+=pitchDeg;
              localRollOffsetRef.current+=rollDeg;
              setPitchDeg(0);setRollDeg(0);
              sendCommand(`TAR:${pitchDeg.toFixed(2)},${rollDeg.toFixed(2)}`);
              toast('Tare sent to device');
            }else{
              toast(isConnected?'Tare sent':'Not connected \u2014 tare not applied');
            }
          },
          style:{width:'100%',padding:'13px 20px',borderRadius:'16px',
            border:'1px solid rgba(251,191,36,0.3)',
            background:'rgba(251,191,36,0.1)',
            color:'#fbbf24',fontSize:'14px',fontWeight:700,cursor:'pointer'}
        },'Tare to Current Position'),

        // Footer — EXACTLY Base44
        h('div',{style:{textAlign:'center',fontSize:'11px',color:'#334155',paddingTop:'4px'}},
          h('p',{style:{margin:0}},'Arduino Nano ESP32 + MPU-6050 \u00B7 BLE Nordic UART'),
          h('p',{style:{margin:'3px 0 0'}},
            `Level tolerance \u00B1${THRESHOLD.toFixed(1)}\u00B0`)
        )
      )
    ),
    // Toasts
    h('div',{style:{position:'fixed',bottom:'1.5rem',left:'50%',
      transform:'translateX(-50%)',zIndex:1000,
      display:'flex',flexDirection:'column',gap:'8px',
      alignItems:'center',pointerEvents:'none'}},
      ts.map(t=>h('div',{key:t.id,className:'toast-in',
        style:{padding:'8px 18px',borderRadius:'20px',fontSize:'13px',
          fontWeight:500,boxShadow:'0 4px 20px rgba(0,0,0,0.5)',
          background:t.type==='error'?'rgba(239,68,68,0.92)':
            t.type==='success'?'rgba(16,185,129,0.92)':'rgba(30,41,59,0.96)',
          color:'white'}},t.msg))
    )
  );
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
