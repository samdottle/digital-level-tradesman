<!DOCTYPE html>
<!--
  Digital Level Tradesman — Web App
  PROTO 1.0 (locked down for shipment)
  Built from v1.9 (the last non-experimental baseline), via TEST 1.0
  (evaluation build, confirmed working). Date: 2026-07-21

  Implements FRONT/REAR guidance in place of implied operator-relative
  left/right, because the MPU-6050 sensor has no magnetometer and
  physically cannot sense yaw (rotation around the vertical axis) --
  meaning no software fix can ever make the display correct for BOTH
  physical orientations if it depends on the operator's own left/right.
  Full background, including everything ruled out before arriving here,
  is preserved in this product's orientation bug handoff document
  (DLT_Orientation_Bug_Handoff.md) -- not repeated here in full, to keep
  this changelog focused on what's true about the shipped code.

  Confirmed correct through worked examples covering both orientations
  from the original bug report:

    Orientation A: FRONT on operator's left, operator raises that end
    (raising FRONT). FRONT becomes the physically high end. Text shows
    RAISE REAR (correct -- REAR is low). Bubble sits near the FRONT
    label -- the end that's actually high. Bubble moves TOWARD the
    raised end, matching a real level.

    Orientation B: unit rotated 180 deg, FRONT now on operator's right.
    Operator raises the SAME physical end as before (still under the
    same hand) -- which, because the bar rotated, is now REAR. REAR
    becomes the physically high end. Text shows RAISE FRONT (correct --
    FRONT is low). Bubble sits near the REAR label -- again the end
    that's actually high.

  In both cases the operator never needs to track their own left/right --
  only match the FRONT sticker on the physical unit to the FRONT label on
  screen. This works because the guidance text, AND the bubble's own
  screen position, are BOTH driven by the same body-fixed pitch signal,
  which is invariant under yaw rotation.

  An earlier evaluation build of this same idea (v1.11) had the bubble
  moving AWAY from the raised end instead of toward it -- a screen-layout
  defect, independent of the yaw-orientation question entirely. Caught
  during review, corrected in TEST 1.0 (FRONT moved to the right side of
  the display), and confirmed here by tracing both orientations above
  with real numbers before treating it as correct.

  NOT VERIFIED AGAINST REAL HARDWARE: POSITIVE_PITCH_MEANS_FRONT_HIGH
  (near the top of this file) determines which physical direction
  produces which pitch sign, and that depends on the PCB's actual
  mounting orientation inside the housing, which isn't visible from
  software. If FRONT/REAR guidance and bubble motion appear backwards
  together on a real unit, flip that one boolean -- text and bubble will
  flip together, staying consistent with each other either way. This is
  the one remaining thing to confirm on a physical unit before this
  design should be considered fully validated.

  Confirmed by diff against v1.9: zero changes to Tare, Calibration,
  pitch computation, EMA smoothing, or any BLE handling. This is purely a
  display-layer addition on top of the existing, unmodified pitchDeg
  value.

  New in v1.9 (changes from v1.8):
    - Added a vertical line through the center of the bubble, reaching
      the bubble's own top and bottom edge with no gap. Previously the
      bubble was a plain filled shape with nothing marking its own
      center, so lining it up against the tube's fixed center tick meant
      eyeballing the middle of a rounded shape against a thin line.
      Now it's a precise line-to-line match.

  New in v1.8 (changes from v1.7):
    - Added a version-only subtitle back under the header title ("v1.8"),
      so the running version is visible at a glance without scrolling to
      the footer. The v1.6 removal was of the chip/sensor detail
      ("MPU-6050 · ESP32 · BLE"), not the version number specifically --
      this restores just the version, without the chip/sensor info.
    - Removed the "Arduino Nano ESP32 + MPU-6050 · BLE Nordic UART" line
      from the footer -- the v1.6 chip/sensor removal only ever covered
      the header; this line in the footer was missed at the time.

  New in v1.7 (changes from v1.6): one confirmed bug fixed in the Tare
  function, ported from Digital Level Tradesman 4 Point v1.1 (see that
  product's changelog and its DL_Tradesman4Point_Tare_Bug_Handoff.md for
  the full derivation and debugging history):

    - EMA smoothing accumulator (emaPitchRef.current/emaRollRef.current)
      was never reset when Tare was tapped -- only the displayed value
      was. The accumulator kept holding its stale pre-tare value, so the
      display would drift back off-center over the following packets
      instead of staying at 0. Fixed: the accumulator now resets to 0
      alongside the displayed state.

  Also fixed: sendCommand() previously had a silent catch(e){} -- any BLE
  write failure produced zero indication. Now returns true/false for
  success/failure and surfaces a toast on any caught write error.

  This product does NOT need the roll sign-convention fix that Tradesman
  4 Point and Pro 4 Point required -- confirmed this product never
  negates roll on receipt (no minus sign on parseFloat(m[2])), so that
  bug does not apply here. The accumulator fix has not been independently
  re-verified against real Tradesman (standard) hardware as of this
  version -- ported directly from a fix confirmed working on Tradesman 4
  Point, which shares this exact mechanism, but worth testing on this
  product's own hardware before treating it as equally proven.

  New in v1.6 (changes from v1.5):
    - Removed the "MPU-6050 · ESP32 · BLE · vX.X" subtitle from the app
      header. Also caught and fixed in this pass: the v1.5 rename had
      updated the title ("Digital Level 2" -> "Digital Level Tradesman")
      but missed the version number in this same subtitle line, which
      still read "v1.4" -- moot now that the whole line is gone, but
      noting it since it was a real, if minor, leftover bug.

  Version: 1.5
  Date:    2026-07-15

  New in v1.5 (changes from v1.4):
    - Rename only, no functional changes: "Digital Level 2" -> "Digital
      Level Tradesman", per family-wide naming revamp.

  Version: 1.4
  Date:    2026-07-15

  New in v1.4 (changes from v1.3):
    - Fixed: pressing "Tare to Current Position" while connected never
      actually settled the display at 0.00° -- it would flash 0.00 for one
      frame, then jump to the NEGATIVE of the pre-tare reading and stay
      there (and stay wrong, including the LEVEL badge, from then on).
      Root cause: onData() applied a persistent app-side correction
      (localPitchOffsetRef) on top of the firmware's own offset, and the
      Tare handler added the same delta to BOTH the app's local offset AND
      the firmware's offset (BLE "TAR:" command, which itself uses ADD
      semantics -- see the .ino firmware). Once the firmware's next
      telemetry packet arrived already corrected, the app subtracted the
      same correction a second time, inverting the error instead of
      canceling it. Fix: removed the app-side localPitchOffsetRef/
      localRollOffsetRef entirely; the firmware is now the single source of
      truth for the tare offset once TAR: is sent, matching how
      Calibration (CAL:) already worked. The Tare button still zeroes the
      display instantly (optimistic UI); the next real telemetry packet
      now correctly confirms 0.00 instead of overshooting.
    - Not affected by this bug: the unit's own physical Tare button
      (standalone/unpaired) and reconnecting afterward -- that path only
      ever used the firmware's offset directly.
-->

<div id="root"></div>
<script>
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const { createElement: h, Fragment } = React;
const { motion, AnimatePresence } = window.Motion || window.FramerMotion || {};

// ── BLE Constants ─────────────────────────────────────────────────────────────
const SERVICE_UUID  = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const CHAR_TX_UUID  = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const CHAR_RX_UUID  = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
const EMA_ALPHA     = 0.05;
const THRESHOLD_OPTIONS = [0.01, 0.05, 0.10];
// PROTO 1.0: FRONT/REAR guidance, mimicking a real mechanical bubble level.
// Pitch (atan2(ayf,azf), body-fixed) is always consistent relative to the
// physical FRONT label, regardless of yaw rotation -- both the guidance
// text AND the bubble's own visual motion are driven by this same signal,
// so they stay in agreement with each other no matter which way the unit
// is rotated. See this product's orientation bug handoff document for
// the full reasoning.
//   NOT VERIFIED AGAINST REAL HARDWARE -- I have no way to see the PCB's
// physical mounting orientation inside the housing from software alone.
// If "RAISE FRONT" and the bubble's motion appear backwards together on
// a real unit, flip this single boolean; nothing else needs to change,
// and text + bubble will flip together, staying consistent with each
// other either way.
const POSITIVE_PITCH_MEANS_FRONT_HIGH = true;

// ── Toast ─────────────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);
  return { toasts, show };
}

function ToastContainer({ toasts }) {
  return h('div', { style: { position:'fixed', bottom:'1.5rem', left:'50%', transform:'translateX(-50%)', zIndex:1000, display:'flex', flexDirection:'column', gap:'8px', alignItems:'center', pointerEvents:'none' } },
    toasts.map(t => h('div', {
      key: t.id,
      className: `toast-enter px-4 py-2 rounded-full text-sm font-medium shadow-lg ${t.type === 'error' ? 'bg-red-500/90 text-white' : t.type === 'success' ? 'bg-emerald-500/90 text-white' : 'bg-slate-700/95 text-slate-200'}`,
    }, t.msg))
  );
}

// ── Slope Calculator ──────────────────────────────────────────────────────────
const KEYS = ['7','8','9','4','5','6','1','2','3','.','0','⌫'];

function SlopeCalculator() {
  const [calcMode, setCalcMode] = useState('deg');
  const [calcInput, setCalcInput] = useState('');

  const handleKey = (k) => {
    if (k === '⌫') { setCalcInput(v => v.slice(0,-1)); return; }
    if (k === '.') { if (!calcInput.includes('.')) setCalcInput(v => v + '.'); return; }
    setCalcInput(v => v.length < 8 ? v + k : v);
  };

  const result = useMemo(() => {
    const v = parseFloat(calcInput);
    if (isNaN(v)) return null;
    if (calcMode === 'deg') {
      const riseIn = Math.tan(Math.abs(v) * Math.PI / 180) * 120;
      return { riseIn, pct: Math.tan(Math.abs(v) * Math.PI / 180) * 100 };
    } else {
      const riseIn = Math.abs(v) * 10;
      return { deg: Math.atan(Math.abs(v) / 12) * 180 / Math.PI, riseIn, pct: (Math.abs(v) / 12) * 100 };
    }
  }, [calcInput, calcMode]);

  return h('div', { className: 'rounded-2xl border border-slate-800 bg-slate-900/50 overflow-hidden' },
    h('div', { className: 'px-4 py-3 border-b border-slate-800/60' },
      h('p', { className: 'text-sm font-medium text-slate-300 flex items-center gap-2' },
        h('span', { className: 'text-teal-400' }, '⇄'),
        'Slope / Degree Calculator'
      )
    ),
    h('div', { className: 'p-4 space-y-3' },
      // Mode toggle
      h('div', { className: 'grid grid-cols-2 gap-2' },
        [{ id:'deg', label:'Degrees → Slope' }, { id:'slope', label:'Slope → Degrees' }].map(opt =>
          h('button', {
            key: opt.id,
            onClick: () => { setCalcMode(opt.id); setCalcInput(''); },
            className: `py-2 rounded-lg border text-xs font-medium transition-all ${calcMode === opt.id ? 'bg-teal-500/20 border-teal-500/50 text-teal-300' : 'bg-slate-800/50 border-slate-700 text-slate-400 hover:border-slate-600'}`
          }, opt.label)
        )
      ),
      // Display
      h('div', { className: 'flex items-center justify-between px-4 py-3 rounded-xl bg-slate-800/80 border border-slate-700' },
        h('span', { className: 'text-2xl font-mono font-semibold text-white tracking-wider flex-1 min-w-0' },
          calcInput || h('span', { className: 'text-slate-600' }, '0.00')
        ),
        h('span', { className: 'text-xs text-slate-500 ml-3 shrink-0' }, calcMode === 'deg' ? 'deg' : 'in/ft')
      ),
      // Keypad
      h('div', { className: 'grid grid-cols-3 gap-1.5' },
        KEYS.map(k => h('button', {
          key: k,
          onClick: () => handleKey(k),
          className: `py-4 rounded-xl border text-xl font-semibold transition-all active:scale-95 ${k === '⌫' ? 'bg-slate-700/60 border-slate-600 text-red-400 hover:bg-slate-700' : k === '.' ? 'bg-slate-800/60 border-slate-700 text-teal-300 hover:bg-slate-700/60' : 'bg-slate-800/60 border-slate-700 text-white hover:bg-slate-700/60'}`
        }, k))
      ),
      // Results
      result && h('div', { className: 'grid grid-cols-2 gap-2' },
        calcMode === 'deg' ? [
          h('div', { key:'rise', className: 'p-2.5 rounded-lg bg-slate-800/60 text-center' },
            h('p', { className: 'text-xs text-slate-500 mb-1' }, 'Rise over 10 ft'),
            h('p', { className: 'text-sm font-mono font-semibold text-teal-300' }, `${result.riseIn.toFixed(3)}"`),
          ),
          h('div', { key:'grade', className: 'p-2.5 rounded-lg bg-slate-800/60 text-center' },
            h('p', { className: 'text-xs text-slate-500 mb-1' }, 'Grade'),
            h('p', { className: 'text-sm font-mono font-semibold text-teal-300' }, `${result.pct.toFixed(3)}%`)
          )
        ] : [
          h('div', { key:'angle', className: 'p-2.5 rounded-lg bg-slate-800/60 text-center' },
            h('p', { className: 'text-xs text-slate-500 mb-1' }, 'Angle'),
            h('p', { className: 'text-sm font-mono font-semibold text-teal-300' }, `${result.deg.toFixed(4)}°`)
          ),
          h('div', { key:'rise', className: 'p-2.5 rounded-lg bg-slate-800/60 text-center' },
            h('p', { className: 'text-xs text-slate-500 mb-1' }, 'Rise over 10 ft'),
            h('p', { className: 'text-sm font-mono font-semibold text-teal-300' }, `${result.riseIn.toFixed(3)}"`)
          )
        ]
      )
    )
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const { toasts, show: toast } = useToast();

  // Connection state
  const [isConnecting, setIsConnecting]   = useState(false);
  const [isConnected, setIsConnected]     = useState(false);
  const [deviceName, setDeviceName]       = useState('');

  // Readings
  const [pitchDeg, setPitchDeg]           = useState(0);
  const [rollDeg, setRollDeg]             = useState(0);

  // Two independent demo modes:
  // simActive = auto-sweep sine wave (play button) - bubble moves automatically
  // demoMode  = finger drag (Demo button) - user drags bubble manually
  const [demoMode, setDemoMode]           = useState(false);
  const [demoPitch, setDemoPitch]         = useState(0);
  const [simActive, setSimActive]         = useState(false);
  const [simPitch, setSimPitch]           = useState(0);
  const simRef                            = useRef(null);

  // Level detection
  const [isLevel, setIsLevel]             = useState(false);
  const [levelThreshold, setLevelThreshold] = useState(0.05);
  const [levelAxis, setLevelAxis]         = useState('pitch');
  const [flashOn, setFlashOn]             = useState(false);

  // Alert
  const [alertMode, setAlertMode]         = useState('app_sound');
  const [alertRepeat, setAlertRepeat]     = useState('once');
  const [soundEnabled, setSoundEnabled]   = useState(true);
  const [showAlert, setShowAlert]         = useState(false);

  // Calibration
  const [showCal, setShowCal]             = useState(false);
  const [calPhase, setCalPhase]           = useState(0);
  const [countdown, setCountdown]         = useState(3);
  const [calOffsets, setCalOffsets]       = useState(null);

  // Drag (demo mode bubble)
  const [isDragging, setIsDragging]       = useState(false);
  const tubeRef                           = useRef(null);
  const dragStartXRef                     = useRef(0);
  const dragStartPitchRef                 = useRef(0);

  // Refs for BLE / audio
  const txCharRef         = useRef(null);
  const deviceRef         = useRef(null);
  const audioCtxRef       = useRef(null);
  const flashIntervalRef  = useRef(null);
  const contBeepRef       = useRef(null);
  const wasLevelRef       = useRef(false);
  const emaPitchRef       = useRef(null);
  const emaRollRef        = useRef(null);
  const pos1Ref           = useRef(null);
  const calSamplesRef     = useRef([]);
  const pitchRef          = useRef(0);
  const rollRef           = useRef(0);
  const levelThreshRef    = useRef(levelThreshold);
  const alertModeRef      = useRef(alertMode);
  const alertRepeatRef    = useRef(alertRepeat);
  const prevAlertModeRef  = useRef(alertMode);

  // Sync refs
  useEffect(() => { levelThreshRef.current  = levelThreshold; }, [levelThreshold]);
  useEffect(() => { alertModeRef.current    = alertMode; },      [alertMode]);
  useEffect(() => { alertRepeatRef.current  = alertRepeat; },    [alertRepeat]);
  useEffect(() => { pitchRef.current        = pitchDeg; },       [pitchDeg]);
  useEffect(() => { rollRef.current         = rollDeg; },        [rollDeg]);

  // Derived
  const appHasSound = alertMode === 'app_sound' || alertMode === 'app_both';
  const appHasFlash = alertMode === 'app_flash' || alertMode === 'app_both';
  // displayPitch priority: demoMode (drag) > simActive (auto-sweep) > live BLE
  const displayPitch = demoMode ? demoPitch : simActive ? simPitch : pitchDeg;
  const displayRoll  = (demoMode || simActive) ? 0 : rollDeg;

  // ── Audio ──
  const playBeep = useCallback(() => {
    if (!soundEnabled) return;
    try {
      if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtxRef.current;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }, [soundEnabled]);

  // ── Simulator ──
  const toggleSim = useCallback(() => {
    if (simActive) {
      clearInterval(simRef.current);
      setSimActive(false);
      setSimPitch(0);
    } else {
      // Auto-sweep works independently — can run alongside or without BLE
      setDemoMode(false); // turn off finger-drag if active
      const t0 = Date.now();
      setSimActive(true);
      simRef.current = setInterval(() => {
        const t = (Date.now() - t0) / 1000;
        // Smooth sweep: slow sine from -4° to +4° with gentle pause at center
        setSimPitch(parseFloat((Math.sin(t * 0.6) * 4.0).toFixed(2)));
      }, 40);
    }
  }, [simActive]);

  useEffect(() => () => clearInterval(simRef.current), []);

  // ── BLE ──
  const sendCommand = useCallback(async (cmd) => {
    if (!txCharRef.current) return false;
    try {
      await txCharRef.current.writeValue(new TextEncoder().encode(cmd + '\n'));
      return true;
    } catch(err) {
      // Surfaces write failures (dropped write, GATT busy, characteristic
      // not ready) instead of silently swallowing them.
      toast(`Command failed: ${cmd.split(':')[0]} (${err.message||err})`, 'error');
      return false;
    }
  }, [toast]);

  const onData = useCallback((e) => {
    const val = new TextDecoder().decode(e.target.value).trim();
    const m = val.match(/P:([-\d.]+),R:([-\d.]+)/);
    if (!m) return;
    const rp = parseFloat(m[1]), rr = parseFloat(m[2]);
    if (emaPitchRef.current === null) { emaPitchRef.current = rp; emaRollRef.current = rr; }
    else {
      emaPitchRef.current = EMA_ALPHA * rp + (1 - EMA_ALPHA) * emaPitchRef.current;
      emaRollRef.current  = EMA_ALPHA * rr + (1 - EMA_ALPHA) * emaRollRef.current;
    }
    const correctedPitch = emaPitchRef.current;
    const correctedRoll  = emaRollRef.current;
    setPitchDeg(parseFloat(correctedPitch.toFixed(2)));
    setRollDeg(parseFloat(correctedRoll.toFixed(2)));
  }, []);

  const onDisconnected = useCallback(() => {
    setIsConnected(false); setIsLevel(false); wasLevelRef.current = false;
    txCharRef.current = null; emaPitchRef.current = null; emaRollRef.current = null;
    toast('Disconnected from device');
  }, [toast]);

  const connectBLE = useCallback(async () => {
    if (!navigator.bluetooth) { toast('Web Bluetooth requires Chrome on Android or desktop Chrome', 'error'); return; }
    setIsConnecting(true);
    try {
      const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }], optionalServices: [SERVICE_UUID] });
      device.addEventListener('gattserverdisconnected', onDisconnected);
      deviceRef.current = device;
      let server;
      for (let i = 1; i <= 3; i++) {
        try { server = await device.gatt.connect(); break; }
        catch(e) { if (i === 3) throw e; await new Promise(r => setTimeout(r, 1000)); }
      }
      const svc  = await server.getPrimaryService(SERVICE_UUID);
      const txCh = await svc.getCharacteristic(CHAR_TX_UUID);
      txCharRef.current = txCh;
      try {
        const rxCh = await svc.getCharacteristic(CHAR_RX_UUID);
        await rxCh.startNotifications();
        rxCh.addEventListener('characteristicvaluechanged', onData);
      } catch(_) {}
      setDeviceName(device.name || 'Level');
      setIsConnected(true);
      toast(`Connected to ${device.name || 'Level'}`, 'success');
    } catch(err) {
      if (err.name !== 'NotFoundError') toast('Connection failed: ' + err.message, 'error');
    }
    setIsConnecting(false);
  }, [onData, onDisconnected, toast]);

  const disconnectBLE = useCallback(() => {
    if (deviceRef.current?.gatt?.connected) deviceRef.current.gatt.disconnect();
    setIsConnected(false); txCharRef.current = null;
  }, []);

  // ── Level detection ──
  useEffect(() => {
    if (demoMode || simActive) return; // demo modes bypass level detection
    const pl = Math.abs(pitchDeg) <= levelThreshold;
    const rl = Math.abs(rollDeg)  <= levelThreshold;
    const now = levelAxis === 'pitch' ? pl : levelAxis === 'roll' ? rl : pl && rl;
    setIsLevel(now);
    const m = alertModeRef.current;
    const hs = m === 'app_sound' || m === 'app_both';
    const hw = m === 'hardware';
    if (now && !wasLevelRef.current) {
      if (alertRepeatRef.current === 'once' && hs) playBeep();
      if (hw) sendCommand('LED:1');
    }
    if (!now && wasLevelRef.current) { if (hw) sendCommand('LED:0'); }
    wasLevelRef.current = now;
  }, [pitchDeg, rollDeg, demoMode, simActive, levelAxis, levelThreshold, playBeep, sendCommand]);

  // Flash effect
  useEffect(() => {
    if (isLevel && appHasFlash) {
      flashIntervalRef.current = setInterval(() => setFlashOn(s => !s), 400);
    } else { clearInterval(flashIntervalRef.current); setFlashOn(false); }
    return () => clearInterval(flashIntervalRef.current);
  }, [isLevel, appHasFlash]);

  // Continuous beep
  useEffect(() => {
    if (isLevel && alertRepeat === 'continuous' && appHasSound) {
      contBeepRef.current = setInterval(() => {
        const m = alertModeRef.current;
        if (m === 'app_sound' || m === 'app_both') playBeep();
        else clearInterval(contBeepRef.current);
      }, 800);
    } else clearInterval(contBeepRef.current);
    return () => clearInterval(contBeepRef.current);
  }, [isLevel, alertRepeat, appHasSound, playBeep]);

  // Alert mode change — sync LED
  useEffect(() => {
    const prev = prevAlertModeRef.current; prevAlertModeRef.current = alertMode;
    if (prev === 'hardware' && alertMode !== 'hardware') sendCommand('LED:0');
    if (prev !== 'hardware' && alertMode === 'hardware' && wasLevelRef.current) sendCommand('LED:1');
  }, [alertMode, sendCommand]);

  // ── Demo drag ──
  const onDragStart = useCallback((clientX) => {
    if (!demoMode) return;
    setIsDragging(true);
    dragStartXRef.current = clientX;
    dragStartPitchRef.current = demoPitch;
  }, [demoMode, demoPitch]);

  const onDragMove = useCallback((clientX) => {
    if (!isDragging || !demoMode) return;
    const w = tubeRef.current ? tubeRef.current.offsetWidth : 300;
    const delta = ((clientX - dragStartXRef.current) / w) * 10;
    setDemoPitch(parseFloat(Math.max(-5, Math.min(5, dragStartPitchRef.current + delta)).toFixed(2)));
  }, [isDragging, demoMode]);

  useEffect(() => {
    const mm = e => onDragMove(e.clientX);
    const mt = e => { if (e.touches[0]) onDragMove(e.touches[0].clientX); };
    const up = () => setIsDragging(false);
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', mt, { passive: true });
    window.addEventListener('touchend', up);
    return () => { window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', up); window.removeEventListener('touchmove', mt); window.removeEventListener('touchend', up); };
  }, [onDragMove]);

  // ── Calibration ──
  const collectSamples = (n, ms) => new Promise(resolve => {
    calSamplesRef.current = [];
    let count = 0;
    const id = setInterval(() => {
      calSamplesRef.current.push({ pitch: pitchRef.current, roll: rollRef.current });
      if (++count >= n) {
        clearInterval(id);
        const avg = (arr, k) => arr.reduce((s,r) => s + r[k], 0) / arr.length;
        resolve({ pitch: avg(calSamplesRef.current,'pitch'), roll: avg(calSamplesRef.current,'roll') });
      }
    }, ms);
  });

  const runCountdown = (secs) => new Promise(resolve => {
    let cd = secs; setCountdown(cd);
    const id = setInterval(() => { cd--; setCountdown(cd); if (cd <= 0) { clearInterval(id); resolve(); } }, 1000);
  });

  const startCalibration = async () => {
    setCalPhase(1); await runCountdown(3);
    setCalPhase(2);
    pos1Ref.current = await collectSamples(60, 100);
    setCalPhase(3);
  };

  const startPosition2 = async () => {
    setCalPhase(4); await runCountdown(3);
    setCalPhase(5);
    const p2 = await collectSamples(60, 100);
    const p1 = pos1Ref.current;
    const op = (p1.pitch + p2.pitch) / 2;
    const or_ = (p1.roll  + p2.roll)  / 2;
    setCalOffsets({ pitch: op, roll: or_ });
    setCalPhase(6);
    sendCommand(`CAL:${op.toFixed(2)},${or_.toFixed(2)}`);
  };

  const resetCalibration = () => {
    setCalOffsets(null); setCalPhase(0);
    sendCommand('CAL:0.00,0.00'); toast('Calibration reset');
  };

  // ── Color helpers ──
  const pitchColor = (deg) => {
    const a = Math.abs(deg);
    if (a <= levelThreshold) return '#34d399';
    if (a <= levelThreshold * 5) return '#facc15';
    return '#f87171';
  };
  const pitchClass = (deg) => {
    const a = Math.abs(deg);
    if (a <= levelThreshold) return 'text-emerald-400';
    if (a <= levelThreshold * 5) return 'text-yellow-400';
    return 'text-red-400';
  };
  const clamp = (v,mn,mx) => Math.min(Math.max(v,mn),mx);
  const barPct = (deg) => 50 + clamp(deg,-5,5)/5*50;
  const barColorCls = (deg) => {
    const a = Math.abs(deg);
    if (a <= levelThreshold) return 'bg-emerald-400';
    if (a <= levelThreshold*5) return 'bg-yellow-400';
    return 'bg-red-400';
  };
  const sign = v => v > 0 ? '+' : '';

  // 10-ft projection
  const riseIn = Math.tan(Math.abs(displayPitch) * Math.PI / 180) * 120;
  const riseDir = displayPitch > 0 ? 'rise' : displayPitch < 0 ? 'drop' : 'level';

  // PROTO 1.0: FRONT/REAR guidance. Correct regardless of which way the
  // unit is yawed, because the measurement (pitch), the instruction

  // driven by this same body-fixed signal -- see
  // POSITIVE_PITCH_MEANS_FRONT_HIGH above for the one thing that needs
  // hardware verification.
  const frontIsHigh = POSITIVE_PITCH_MEANS_FRONT_HIGH ? displayPitch > 0 : displayPitch < 0;
  const withinLevel = Math.abs(displayPitch) <= levelThreshold;
  const guidance = withinLevel ? 'LEVEL' : frontIsHigh ? 'RAISE REAR' : 'RAISE FRONT';

  return h(Fragment, null,
    h('div', { className: 'min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white' },

                  isConnected
                    ? h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0' })
                    : h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M3 3l18 18M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0' })
                )

              h('div', null,

                isConnecting

                  : null,
                isConnected ? 'Disconnect' : isConnecting ? 'Connecting...' : 'Connect'
              )
            )
          )
        ),

        // ── Primary Display ──
        h('div', {
          className: `rounded-2xl border p-5 text-center space-y-1 transition-all duration-300 ${isLevel && appHasFlash && flashOn ? 'bg-emerald-500/20 border-emerald-400/60' : isLevel ? 'bg-emerald-500/10 border-emerald-500/40' : 'bg-slate-900/60 border-slate-800'}`,
        },
          // Top row: demo toggle + level badge
          h('div', { className: 'flex items-center justify-between mb-2' },
            h('div', { className: `flex items-center gap-1.5 px-2 py-0.5 rounded-full border text-xs font-semibold ${isLevel ? 'bg-emerald-500/20 border-emerald-500/40 text-emerald-400' : 'bg-slate-800/60 border-slate-700/60 text-slate-600'}` },
              isLevel ? '✓ LEVEL' : '— NOT LEVEL'
            ),
            h('button', {
              onClick: () => { setDemoMode(d => { if (!d) { setIsLevel(false); setSimActive(false); clearInterval(simRef.current); setSimPitch(0); } return !d; }); setDemoPitch(0); },
              className: `px-2.5 py-1 rounded-md border text-xs font-medium transition-all ${demoMode ? 'bg-violet-500/20 border-violet-500/40 text-violet-300' : 'bg-slate-800/50 border-slate-700 text-slate-500 hover:border-slate-500'}`
            }, demoMode ? '● Demo' : 'Demo')
          ),

          // Big pitch number
          h('p', { className: 'text-xs font-medium text-slate-500 uppercase tracking-widest' }, 'Pitch'),
          h('p', { className: `text-7xl font-mono font-bold tracking-tight leading-none ${pitchClass(displayPitch)}` },
            `${sign(displayPitch)}${displayPitch.toFixed(2)}°`
          ),

          // PROTO 1.0: FRONT/REAR guidance -- correct regardless of which
          // way the unit is yawed on the surface. Match this label to the
          // physical FRONT marking on the unit; the instruction is
          // unambiguous either way.
          h('p', {
            className: `text-2xl font-bold tracking-wide ${withinLevel ? 'text-emerald-400' : 'text-amber-400'}`
          }, guidance),

          // 10-ft projection
          h('div', { className: 'mt-3 flex items-center justify-between gap-2 px-4 py-2.5 rounded-xl bg-slate-800/70 border border-slate-700' },
            h('span', { className: 'text-xs text-slate-400' }, 'Over 10 ft:'),
            h('span', { className: `text-sm font-mono font-semibold ${pitchClass(displayPitch)}` }, `${riseIn.toFixed(3)}"`),

            h('span', { className: 'text-xs text-slate-500' }, riseDir)
          ),

          // Bubble vial
          h('div', { className: 'pt-4 pb-1 px-1' },
            // PROTO 1.0: REAR on screen-left, FRONT on screen-right.
            // barPct maps positive pitch (FRONT high, per the constant
            // above) to a HIGHER percentage -- i.e. screen-right -- so
            // FRONT must be drawn on the right for the bubble to move
            // TOWARD the raised end, matching a real mechanical level.
            // Purely a screen-layout choice; doesn't correspond to
            // anything physical by itself. The operator matches whichever
            // label says FRONT to the physical FRONT marking on the unit.
            h('div', { className: 'flex justify-between text-xs font-semibold text-slate-400 mb-1 px-1' },
              h('span', null, 'REAR'), h('span', null, 'FRONT')
            ),
            h('div', { className: 'flex items-center gap-1' },
              // Left cap
              h('div', { className: 'flex-shrink-0 w-4 h-10 rounded-l-full border-2 border-r-0 border-slate-500 bg-slate-800/60' }),
              // Tube
              h('div', {
                ref: tubeRef,
                className: 'relative flex-1 h-10 bg-slate-800/80 border-y-2 border-slate-500 bubble-tube'
              },
                // Glass sheen
                h('div', { className: 'absolute top-0 left-0 right-0 h-2 glass-sheen pointer-events-none' }),
                // Level zone
                h('div', {
                  className: 'absolute top-0 bottom-0 bg-emerald-500/15 border-x border-emerald-500/30',
                  style: { left: `${barPct(-levelThreshold)}%`, width: `${barPct(levelThreshold) - barPct(-levelThreshold)}%` }
                }),
                // Center tick
                h('div', { className: 'absolute top-0 bottom-0 left-1/2 w-px bg-slate-400/60 z-10' }),
                // Minor ticks
                h('div', { className: 'absolute top-1 bottom-1 w-px bg-slate-600/50', style: { left: `${barPct(-2.5)}%` } }),
                h('div', { className: 'absolute top-1 bottom-1 w-px bg-slate-600/50', style: { left: `${barPct(2.5)}%` } }),
                // Bubble
                h('div', {
                  className: `absolute top-1.5 bottom-1.5 w-6 rounded-full shadow-lg border border-white/20 transition-all ${barColorCls(displayPitch)} ${demoMode ? 'cursor-grab active:cursor-grabbing' : ''}`,
                  style: {
                    left: `${barPct(displayPitch)}%`,
                    transform: 'translateX(-50%)',
                    transition: demoMode ? 'none' : 'left 0.08s ease-out'
                  },
                  onMouseDown: (e) => { e.preventDefault(); onDragStart(e.clientX); },
                  onTouchStart: (e) => { if (e.touches[0]) onDragStart(e.touches[0].clientX); }
                },
                  // Vertical line through the bubble's own center, reaching
                  // its full top and bottom edge (no gap) -- makes it a
                  // precise line-to-line match against the tube's fixed
                  // center tick, instead of eyeballing the center of a
                  // rounded shape against a thin line.
                  h('div', { className: 'absolute inset-y-0 left-1/2 w-px bg-white/80 -translate-x-1/2 pointer-events-none' })
                )
              ),
              // Right cap
              h('div', { className: 'flex-shrink-0 w-4 h-10 rounded-r-full border-2 border-l-0 border-slate-500 bg-slate-800/60' })
            ),
            h('div', { className: 'flex justify-between text-xs text-slate-600 mt-1.5 px-5' },
              h('span', null, '-5°'), h('span', null, '0°'), h('span', null, '+5°')
            )
          ),

          // Threshold selector
          h('div', { className: 'flex justify-center gap-2 pt-1' },
            THRESHOLD_OPTIONS.map(t =>
              h('button', {
                key: t,
                onClick: () => setLevelThreshold(t),
                className: `px-4 py-1.5 rounded-lg border text-xs font-mono font-semibold transition-all ${levelThreshold === t ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-300' : 'bg-slate-800/60 border-slate-700 text-slate-500 hover:border-slate-500'}`
              }, `±${t.toFixed(2)}°`)
            )
          )
        ),

        // ── Roll Card ──
        h('div', { className: 'rounded-2xl border border-slate-800/60 bg-slate-900/40 p-4 flex items-center justify-between' },
          h('div', null,
            h('p', { className: 'text-xs text-slate-500 uppercase tracking-widest' }, 'Roll'),
            h('p', { className: `text-3xl font-mono font-semibold mt-0.5 ${pitchClass(displayRoll)}` },
              `${sign(displayRoll)}${displayRoll.toFixed(2)}°`
            )
          ),
          h('div', { className: 'text-right space-y-1' },
            h('p', { className: 'text-xs text-slate-600' }, 'Short axis / width'),
            h('div', { className: 'flex gap-1.5 justify-end' },
              ['pitch','both'].map(ax =>
                h('button', {
                  key: ax,
                  onClick: () => setLevelAxis(ax),
                  className: `px-2.5 py-1 rounded-md border text-xs font-medium transition-all ${levelAxis === ax ? 'bg-blue-500/20 border-blue-500/40 text-blue-300' : 'bg-slate-800/50 border-slate-700 text-slate-500 hover:border-slate-600'}`
                }, ax === 'pitch' ? 'Pitch only' : 'Both axes')
              )
            )
          )
        ),

        // ── Alert Settings ──
        h('div', { className: 'rounded-2xl border border-slate-800 bg-slate-900/50 overflow-hidden' },
          h('button', {
            className: 'w-full px-4 py-3 flex items-center justify-between border-b border-slate-800/60',
            onClick: () => setShowAlert(s => !s)
          },
            h('span', { className: 'text-sm font-medium text-slate-300 flex items-center gap-2' },
              h('svg', { className:'w-4 h-4 text-slate-400', fill:'none', viewBox:'0 0 24 24', stroke:'currentColor', strokeWidth:2 },
                h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9' })
              ),
              'Alert Settings'
            ),
            h('svg', { className:'w-4 h-4 text-slate-500', fill:'none', viewBox:'0 0 24 24', stroke:'currentColor', strokeWidth:2 },
              showAlert
                ? h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M5 15l7-7 7 7' })
                : h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M19 9l-7 7-7-7' })
            )
          ),
          showAlert && h('div', { className: 'p-4 space-y-3' },
            h('p', { className: 'text-xs text-slate-500' }, 'Alert type'),
            h('div', { className: 'grid grid-cols-2 gap-2' },
              [
                { id:'app_sound', label:'App Sound' },
                { id:'app_flash', label:'App Flash' },
                { id:'app_both',  label:'Sound + Flash' },
                { id:'hardware',  label:'LED + Buzzer' },
              ].map(opt =>
                h('button', {
                  key: opt.id,
                  onClick: () => setAlertMode(opt.id),
                  className: `px-3 py-2 rounded-lg border text-xs font-medium transition-all ${alertMode === opt.id ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' : 'bg-slate-800/50 border-slate-700 text-slate-400 hover:border-slate-600'}`
                }, opt.label)
              )
            ),
            appHasSound && h(Fragment, null,
              h('p', { className: 'text-xs text-slate-500' }, 'Signal mode'),
              h('div', { className: 'grid grid-cols-2 gap-2' },
                [{ id:'once', label:'Beep once' }, { id:'continuous', label:'Continuous' }].map(opt =>
                  h('button', {
                    key: opt.id,
                    onClick: () => setAlertRepeat(opt.id),
                    className: `py-2 rounded-lg border text-xs font-medium transition-all ${alertRepeat === opt.id ? 'bg-purple-500/20 border-purple-500/50 text-purple-300' : 'bg-slate-800/50 border-slate-700 text-slate-400 hover:border-slate-600'}`
                  }, opt.label)
                )
              ),
              h('button', {
                onClick: () => setSoundEnabled(s => !s),
                className: 'flex items-center gap-2 text-xs text-slate-500 hover:text-slate-300 transition-colors'
              },
                h('svg', { className:'w-3.5 h-3.5', fill:'none', viewBox:'0 0 24 24', stroke:'currentColor', strokeWidth:2 },
                  soundEnabled
                    ? h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M15.536 8.464a5 5 0 010 7.072M12 6v12m0 0l-3-3m3 3l3-3' })
                    : h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z' })
                ),
                `Sound ${soundEnabled ? 'on' : 'muted'}`
              )
            )
          )
        ),

        // ── Tare ──
        h('button', {
          onClick: async () => {
            if (!isConnected) { toast('Not connected — tare not applied'); return; }
            // Sends a single TAR: command (additive, single source of
            // truth for the offset). Confirmed fix, ported from Digital
            // Level Tradesman 4 Point v1.1: the EMA accumulator
            // (emaPitchRef/emaRollRef) is now reset alongside the
            // displayed state, not just the display -- without this, the
            // next real packet blends the firmware's now-corrected
            // reading into a stale accumulator value and the display
            // drifts back off-center instead of staying at 0. This
            // product does not negate roll on receipt (confirmed: no
            // minus sign on parseFloat(m[2]) below), so the roll
            // sign-convention bug found and fixed in the 4-Point products
            // does not apply here.
            const ok = await sendCommand(`TAR:${pitchDeg.toFixed(2)},${rollDeg.toFixed(2)}`);
            if (!ok) { toast('Tare failed — command not sent, try again', 'error'); return; }
            emaPitchRef.current = 0;
            emaRollRef.current = 0;
            setPitchDeg(0);
            setRollDeg(0);
            toast('Tared — display zeroed', 'success');
          },
          className: 'w-full py-3 rounded-xl border text-sm font-medium transition-all bg-amber-500/10 border-amber-500/30 text-amber-300 hover:bg-amber-500/20'
        }, 'Tare to Current Position'),

        // ── Calibration ──
        h('div', { className: 'rounded-2xl border border-slate-800 bg-slate-900/50 overflow-hidden' },
          h('button', {
            className: 'w-full px-4 py-3 flex items-center justify-between',
            onClick: () => setShowCal(s => !s)
          },
            h('span', { className: 'text-sm font-medium text-slate-300 flex items-center gap-2' },
              h('svg', { className:'w-4 h-4 text-amber-400', fill:'none', viewBox:'0 0 24 24', stroke:'currentColor', strokeWidth:2 },
                h('circle', { cx:12, cy:12, r:3 }),
                h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83' })
              ),
              'Calibration'
            ),
            h('svg', { className:'w-4 h-4 text-slate-500', fill:'none', viewBox:'0 0 24 24', stroke:'currentColor', strokeWidth:2 },
              showCal
                ? h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M5 15l7-7 7 7' })
                : h('path', { strokeLinecap:'round', strokeLinejoin:'round', d:'M19 9l-7 7-7-7' })
            )
          ),
          showCal && h('div', { className: 'px-4 pb-4 space-y-4 border-t border-slate-800' },
            h('div', { className: 'h-3' }),
            // Instructions
            (calPhase === 0 || calPhase === 6) && h('div', { className: 'p-3 rounded-lg bg-amber-500/10 border border-amber-500/30 space-y-1' },
              h('p', { className: 'font-semibold text-amber-400 text-xs' }, 'Two-position method — no flat reference needed:'),
              h('ol', { className: 'list-decimal list-inside space-y-1 text-xs text-slate-300' },
                h('li', null, 'Place on any stable surface and tap Start'),
                h('li', null, 'Hold still during countdown and sampling'),
                h('li', null, h('strong', null, 'Rotate exactly 180°'), ' end-for-end'),
                h('li', null, 'Tap Sample Position 2 and hold still')
              )
            ),
            // Progress steps
            h('div', { className: 'flex items-center gap-2 text-xs text-slate-500' },
              [{ n:1,label:'Pos 1' },{ n:2,label:'Flip' },{ n:3,label:'Pos 2' },{ n:4,label:'Done' }].map((s,i) => {
                const active = (s.n===1&&calPhase<=2)||(s.n===2&&calPhase===3)||(s.n===3&&(calPhase===4||calPhase===5))||(s.n===4&&calPhase===6);
                const done   = (s.n===1&&calPhase>=3)||(s.n===2&&calPhase>=4)||(s.n===3&&calPhase>=6)||(s.n===4&&calPhase===6);
                return h(Fragment, { key:s.n },
                  h('span', { className: `px-2 py-0.5 rounded-full border text-xs ${done ? 'bg-emerald-500/20 border-emerald-500/40 text-emerald-400' : active ? 'bg-amber-500/20 border-amber-500/40 text-amber-300' : 'border-slate-700 text-slate-600'}` }, s.label),
                  i < 3 && h('span', { className: 'flex-1 border-t border-slate-700 border-dashed' })
                );
              })
            ),
            // Countdown
            (calPhase===1||calPhase===4) && h('div', { className:'text-center py-3' },
              h('p', { className:'text-5xl font-bold text-amber-400' }, countdown),
              h('p', { className:'text-xs text-slate-400 mt-1' }, 'Hold still…')
            ),
            // Sampling spinner
            (calPhase===2||calPhase===5) && h('div', { className:'text-center py-3' },
              h('svg', { className:'w-8 h-8 text-emerald-400 animate-spin-slow mx-auto', fill:'none', viewBox:'0 0 24 24' },
                h('circle', { className:'opacity-25', cx:12, cy:12, r:10, stroke:'currentColor', strokeWidth:4 }),
                h('path', { className:'opacity-75', fill:'currentColor', d:'M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z' })
              ),
              h('p', { className:'text-xs text-slate-400 mt-2' }, 'Sampling… keep still')
            ),
            // Flip prompt
            calPhase===3 && h('div', { className:'p-3 rounded-lg bg-blue-500/10 border border-blue-500/30 text-center space-y-2' },
              h('p', { className:'text-blue-300 font-semibold text-sm' }, '↕ Rotate 180° now'),
              h('p', { className:'text-xs text-slate-400' }, 'Flip end-for-end, then tap below')
            ),
            // Offsets display
            calPhase===6 && calOffsets && h('div', { className:'flex gap-4 text-center' },
              h('div', { className:'flex-1 p-2 rounded-lg bg-slate-800/60' },
                h('p', { className:'text-xs text-slate-500' }, 'Pitch offset'),
                h('p', { className:'text-sm font-mono text-emerald-400' }, `${calOffsets.pitch > 0 ? '+' : ''}${calOffsets.pitch.toFixed(2)}°`)
              ),
              h('div', { className:'flex-1 p-2 rounded-lg bg-slate-800/60' },
                h('p', { className:'text-xs text-slate-500' }, 'Roll offset'),
                h('p', { className:'text-sm font-mono text-emerald-400' }, `${calOffsets.roll > 0 ? '+' : ''}${calOffsets.roll.toFixed(2)}°`)
              )
            ),
            calPhase===6 && h('p', { className:'text-center text-sm text-emerald-400' }, '✓ Calibration applied'),
            // Buttons
            h('div', { className:'flex gap-3' },
              (calPhase===0||calPhase===6) && h('button', {
                onClick: startCalibration,
                disabled: !isConnected,
                className: `flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${!isConnected ? 'bg-slate-700/50 text-slate-600 cursor-not-allowed' : 'bg-amber-600 hover:bg-amber-700 text-white'}`
              }, calPhase===6 ? 'Re-Calibrate' : 'Start'),
              calPhase===3 && h('button', {
                onClick: startPosition2,
                className: 'flex-1 py-2.5 rounded-xl text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white transition-all'
              }, 'Sample Position 2'),
              calOffsets && calPhase===6 && h('button', {
                onClick: resetCalibration,
                className: 'px-4 py-2.5 rounded-xl text-sm font-medium border border-slate-700 text-slate-300 hover:bg-slate-800 transition-all'
              }, 'Reset')
            ),
            !isConnected && h('p', { className:'text-xs text-slate-500 text-center' }, 'Connect via BLE to calibrate')
          )
        ),

        // ── Slope Calculator ──
        h(SlopeCalculator),

        // ── Footer ──
        h('div', { className:'text-center text-xs text-slate-600 pt-2 pb-4 space-y-1' },
          h('p', null, 'Advertise as "Level" in your Arduino sketch'),
          h('p', { className:'text-slate-700 mt-2' }, '© Digital Level Tradesman · Proto 1.0')
        )
      )
    ),
    h(ToastContainer, { toasts })
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
